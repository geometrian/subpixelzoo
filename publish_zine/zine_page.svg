         x="0"
         y="0"><tspan
           x="39.939453"
           y="657.12563"
           id="tspan2468">Presented by Agatha Mallett. For more about subpixels, see:
</tspan><tspan
           x="39.939453"
           y="678.79226"
           id="tspan2470">https://geometrian.com/resources/subpixelzoo/</tspan></text></a></g></svg>
